<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивная карта: Водный надзор</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
        }
        
        h1 {
            color: #333;
            margin: 0 0 15px 0;
        }
        
        .map-container {
            margin: 0 0 15px 0;
            border-radius: 10px;
            overflow: hidden;
        }
        
        iframe {
            display: block;
            width: 100%;
            height: 100%;
            min-height: 800px;
            border: 0;
            border-radius: 10px;
        }
        
        .footer {
            color: #666;
            font-size: 14px;
            border-top: 1px solid #eee;
            padding-top: 15px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌿 Интерактивная карта: Водный надзор</h1>
        <h2 style="color: #555; font-size: 18px; margin-top: -5px; margin-bottom: 15px;">📍 Ленинградская область</h2>
        
        <!-- Карта Flexatel для ООПТ и ГП с центровкой на Ленобласть -->
        <div class="map-container">
            <iframe
                src="https://gis.flexatel.xyz/viewer/86741d75-fe92-4dad-92d7-b42829517af0?center=60.0,32.5&zoom=8"
                title="Карта ООПТ и ГП"
                width="100%"
                height="100%"
                style="min-height:800px; border: 0px; border-radius: 10px;"
                allow="geolocation"
                allowfullscreen>
            </iframe>
        </div>
        
        <!-- Текст -->
        <p>🌍 Карта содержит информация об ООПТ и ГП. Обновляется автоматически — все изменения в Flexatel сразу появляются здесь.</p>
        
        <!-- Футер с датой -->
        <div class="footer">
            <span>© ООПТ и ГП Ленобласти • </span>
            <span>Обновлено: <span id="lastUpdate"></span></span>
        </div>
    </div>

    <!-- Скрипт для даты -->
    <script>
        document.getElementById('lastUpdate').textContent = 
            new Date().toLocaleString('ru-RU', {
                day: 'numeric',
                month: 'long',
                year: 'numeric'
            });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивная карта: ООПТ и ГП</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
        }
        
        h1 {
            color: #333;
            margin: 0 0 15px 0;
        }
        
        .map-container {
            margin: 0 0 15px 0;
            border-radius: 10px;
            overflow: hidden;
        }
        
        iframe {
            display: block;
            width: 100%;
            height: 100%;
            min-height: 800px;
            border: 0;
            border-radius: 10px;
        }
        
        .footer {
            color: #666;
            font-size: 14px;
            border-top: 1px solid #eee;
            padding-top: 15px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌿 Интерактивная карта: ООПТ и ГП</h1>
        
        <!-- Карта Flexatel для ООПТ и ГП с центровкой на Ленобласть -->
        <div class="map-container">
            <iframe
                src="https://gis.flexatel.xyz/viewer/86741d75-fe92-4dad-92d7-b42829517af0?center=59.966566,31.727934&zoom=7"
                title="Карта ООПТ и ГП"
                width="100%"
                height="100%"
                style="min-height:800px; border: 0px; border-radius: 10px;"
                allow="geolocation"
                allowfullscreen>
            </iframe>
        </div>
        
        <!-- Текст -->
        <p>🌍 Карта содержит границы особо охраняемых природных территорий (ООПТ) и гидрологические посты (ГП) Ленинградской области. Обновляется автоматически — все изменения в Flexatel сразу появляются здесь.</p>
        
        <!-- Футер с датой -->
        <div class="footer">
            <span>© ООПТ и ГП • </span>
            <span>Обновлено: <span id="lastUpdate"></span></span>
        </div>
    </div>

    <!-- Скрипт для даты -->
    <script>
        document.getElementById('lastUpdate').textContent = 
            new Date().toLocaleString('ru-RU', {
                day: 'numeric',
                month: 'long',
                year: 'numeric'
            });
    </script>
</body>
</html>
